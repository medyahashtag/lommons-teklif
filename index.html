<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            padding: 20px;
            font-size: 16px;
            line-height: 1.5;
        }
        @media only screen and (max-width: 768px) {
            body {
                font-size: 14px;
                padding: 10px;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
        }
        @media only screen and (max-width: 480px) {
            body {
                font-size: 12px;
                padding: 5px;
            }
            .grid {
                grid-template-columns: 1fr;
            }
        }
        /* Touch gesture support */
        .touch-support {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="touch-support">
    <div class="grid">
        <div>Item 1</div>
        <div>Item 2</div>
        <div>Item 3</div>
        <div>Item 4</div>
    </div>
</body>
</html>
